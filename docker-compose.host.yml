# Loki-Pi host network environment.
#
# Uses host networking so the container shares your Mac's IP address
# and can scan your actual network (10.0.0.X, etc.) directly.
#
# Usage:
#   docker compose -f docker-compose.host.yml up --build
#   # Container will be accessible at your Mac's IP on port 8000

services:
  loki:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: loki-pi-host
    hostname: loki-host
    network_mode: host
    volumes:
      - ./loki:/app/loki
      - ./loki.py:/app/loki.py
      - ./requirements.txt:/app/requirements.txt
      - loki-host-data:/data
    environment:
      LOKI_BIND: "0.0.0.0"
      LOKI_PORT: "8000"
      LOKI_DATA_DIR: "/data"
      LOKI_LOG_LEVEL: "INFO"
      BJORN_IP: "10.0.0.4"  # Mac's actual network IP - auto-detection gets Docker IP on macOS
    restart: unless-stopped

volumes:
  loki-host-data: